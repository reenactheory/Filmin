name: Filmin
options:
  bundleIdPrefix: com.reenactheory
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: ko
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "3"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
targets:
  Filmin:
    type: application
    platform: iOS
    sources:
      - path: Filmin
    info:
      path: Filmin/Info.plist
      properties:
        CFBundleDisplayName: "필름인"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIImageName: "LaunchLogo"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: "필름 보기를 사진 라이브러리에 저장합니다."
        ITSAppUsesNonExemptEncryption: false
        UIUserInterfaceStyle: Light
        UIAppFonts:
          - Pretendard-Regular.otf
          - Pretendard-Medium.otf
          - Pretendard-SemiBold.otf
          - Pretendard-Bold.otf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reenactheory.Filmin
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: 42Q2FTK7GK
        CODE_SIGN_STYLE: Automatic
